  </g>

  <path d="M720 235L762 268L719 298" fill="none" stroke="#FFFFFF" stroke-opacity="0.86" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M304 790L262 756L305 727" fill="none" stroke="#FFFFFF" stroke-opacity="0.74" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
