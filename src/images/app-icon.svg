<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="158" y1="103" x2="870" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3A2BEA"/>
      <stop offset="0.46" stop-color="#8E24AA"/>
      <stop offset="1" stop-color="#21C7D9"/>
    </linearGradient>
    <radialGradient id="glow" cx="330" cy="220" r="720" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.46"/>
      <stop offset="0.36" stop-color="#FFFFFF" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tile" x1="242" y1="170" x2="790" y2="814" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.48" stop-color="#F6E9FF"/>
      <stop offset="1" stop-color="#C83FE2"/>
    </linearGradient>
    <linearGradient id="fold" x1="200" y1="165" x2="520" y2="465" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.68" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E8C8F7"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="244" y1="748" x2="817" y2="325" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="0.55" stop-color="#FFFFFF" stop-opacity="0.88"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="36" flood-color="#180A34" flood-opacity="0.34"/>
