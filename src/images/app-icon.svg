    <filter id="foldShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="22" dy="28" stdDeviation="26" flood-color="#2A064A" flood-opacity="0.26"/>
    </filter>
    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#250833" flood-opacity="0.28"/>
    </filter>
    <clipPath id="shape">
      <rect x="72" y="72" width="880" height="880" rx="218" ry="218"/>
    </clipPath>
    <clipPath id="tileClip">
      <circle cx="512" cy="512" r="350"/>
    </clipPath>
  </defs>

  <g clip-path="url(#shape)">
    <rect width="1024" height="1024" fill="url(#bg)"/>
    <rect width="1024" height="1024" fill="url(#glow)"/>
    <circle cx="830" cy="236" r="212" fill="#FFFFFF" opacity="0.10"/>
    <circle cx="174" cy="812" r="260" fill="#070A2D" opacity="0.18"/>
    <path d="M162 724C290 890 580 918 765 760" fill="none" stroke="#FFFFFF" stroke-opacity="0.17" stroke-width="42" stroke-linecap="round"/>
  </g>

  <circle cx="512" cy="512" r="350" fill="url(#tile)" filter="url(#softShadow)"/>
  <g clip-path="url(#tileClip)">
    <path d="M140 190L482 424L140 720Z" fill="url(#fold)" filter="url(#foldShadow)"/>
    <path d="M210 702C360 562 616 555 815 380" fill="none" stroke="url(#ribbon)" stroke-width="42" stroke-linecap="round" opacity="0.82"/>
    <path d="M236 762C386 622 632 604 832 430" fill="none" stroke="#FFFFFF" stroke-width="16" stroke-linecap="round" opacity="0.36"/>
  </g>

  <g filter="url(#textShadow)">
    <text x="514" y="352"
      text-anchor="middle"
      dominant-baseline="central"
      font-family="Noto Sans CJK SC, Noto Sans CJK, Source Han Sans SC, Arial, sans-serif"
      font-size="194"
      font-weight="900"
      fill="#7E1AC8">文</text>
    <text x="512" y="670"
